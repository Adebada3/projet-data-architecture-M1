version: '3.9'

services:

  postgres:
    image: postgis/postgis:17-3.4
    container_name: ude_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urban_data_explorer
      POSTGRES_USER: ude_user
      POSTGRES_PASSWORD: ude_secure_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ude_user -d urban_data_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8
    container_name: ude_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ude_user
      MONGO_INITDB_ROOT_PASSWORD: ude_secure_2026
      MONGO_INITDB_DATABASE: urban_data_explorer
    volumes:
      - mongo_data:/data/db
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ude_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ude_user:ude_secure_2026@postgres:5432/urban_data_explorer
      MONGODB_URL: mongodb://ude_user:ude_secure_2026@mongodb:27017/
      SECRET_KEY: urban_data_explorer_secret_2026
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data: